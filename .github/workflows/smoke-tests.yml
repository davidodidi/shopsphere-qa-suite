name: 🔥 Smoke Tests — PR & Push
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
jobs:
  smoke-web:
    name: 🌐 Web Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: Build and install core module
        run: mvn clean install -DskipTests --no-transfer-progress
      - name: Start Selenium Grid
        run: |
          docker compose -f docker/docker-compose.yml up -d selenium-hub chrome-node-1
          echo "Waiting for Selenium Hub to be ready..."
          timeout 60 bash -c 'until curl -s http://localhost:4444/wd/hub/status | grep "\"ready\": true" > /dev/null; do sleep 2; done'
          echo "Selenium Grid is ready"
      - name: Run Web Smoke Tests
        run: |
          mvn clean test -pl web-tests \
            -Dcucumber.filter.tags="@smoke" \
            -Dgrid.url=http://localhost:4444/wd/hub \
            -Denv=staging \
            -Dheadless=true \
            --no-transfer-progress
        env:
          ADMIN_USERNAME: ${{ secrets.STAGING_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-web-smoke
          path: web-tests/target/allure-results/
          retention-days: 7
      - name: Upload Cucumber Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports-smoke
          path: web-tests/target/cucumber-reports/
  smoke-api:
    name: 🔌 API Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: Build and install core module
        run: mvn clean install -DskipTests --no-transfer-progress
      - name: Run API Smoke Tests
        run: |
          mvn test -pl api-tests \
            -Dcucumber.filter.tags="@smoke and @api" \
            -Denv=staging \
            --no-transfer-progress
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api-smoke
          path: api-tests/target/allure-results/
  post-status:
    name: 📊 Test Status
    runs-on: ubuntu-latest
    needs: [smoke-web, smoke-api]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🧪 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Web Smoke | ${{ needs.smoke-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Smoke | ${{ needs.smoke-api.result }} |" >> $GITHUB_STEP_SUMMARY
