name: 📱 Mobile Tests — Windows Android Emulator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1-5'

jobs:
  mobile-android-windows:
    name: 📱 Android Mobile Tests (Pixel 6 API 35)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium + UIAutomator2
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2
          appium --version

      - name: Accept Android SDK licenses
        shell: pwsh
        run: |
          & "${env:ANDROID_HOME}\tools\bin\sdkmanager.bat" --licenses | ForEach-Object {$_; }

      - name: Pre-launch Pixel 6 Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_API_35
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 300
          force-avd-creation: true
          cores: 2
          script: echo "Emulator ready"

      - name: Start Appium server in background
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "appium" -ArgumentList "--log appium.log"
          Start-Sleep -Seconds 15
          Write-Output "Appium should be ready now"

      - name: Run mobile tests
        shell: pwsh
        run: |
          mvn test -pl mobile-tests `
            -Dplatform=android `
            -Dappium.server=http://127.0.0.1:4723 `
            -Dapp.path="${{ github.workspace }}\mobile-tests\src\test\resources\apps\SauceLabs.apk" `
            -Ddevice.name="Pixel_6_API_35" `
            -Dplatform.version="15" `
            -Dcucumber.filter.tags="@mobile" `
            --no-transfer-progress

      - name: Upload Appium logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: appium-logs
          path: appium.log

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile
          path: mobile-tests/target/allure-results/

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        with:
          name: mobile-surefire-reports
          path: mobile-tests/target/surefire-reports/