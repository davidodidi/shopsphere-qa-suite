name: 📱 Mobile Tests — Android Emulator

on:
  workflow_dispatch:

jobs:
  mobile-android:
    name: 📱 Android Mobile Tests (Pixel 6 API 35)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2
          appium --version

      - name: Enable KVM (required for Android emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
          sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build Maven modules
        run: |
          mvn install -N -DskipTests --no-transfer-progress
          mvn install -pl core -DskipTests --no-transfer-progress

      - name: Start Appium
        run: |
          appium --log appium.log &
          echo "Waiting for Appium..."
          timeout 30 bash -c 'until curl -s http://127.0.0.1:4723/status > /dev/null; do sleep 2; done'
          echo "Appium ready"

      - name: Run Android Emulator + Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_API_35
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            mvn test -pl mobile-tests \
              -Dplatform=android \
              -Dappium.server=http://127.0.0.1:4723 \
              -Dapp.path="${GITHUB_WORKSPACE}/mobile-tests/src/test/resources/apps/SauceLabs.apk" \
              -Ddevice.name="Pixel_6_API_35" \
              -Dplatform.version="15" \
              -Dcucumber.filter.tags="@mobile" \
              --no-transfer-progress

      - name: Upload Appium logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: appium.log

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile
          path: mobile-tests/target/allure-results/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-surefire-reports
          path: mobile-tests/target/surefire-reports/