name: 📱 Mobile Tests — Android Emulator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1-5'

jobs:
  mobile-android:
    name: 📱 Android Mobile Tests (Pixel 6 API 35)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17 (for Android SDK & Emulator)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Java 11 (for Maven build)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Node.js (required for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2 driver
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2
          appium --version

      - name: Build parent + core modules
        run: |
          mvn install -N -DskipTests --no-transfer-progress
          mvn install -pl core -DskipTests --no-transfer-progress

      # --- Emulator step with Java 17 ---
      - name: Pre-launch Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_API_35
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 300
          force-avd-creation: true
          cores: 2
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Start Appium server
        run: |
          pkill -f appium || true
          appium --log appium.log &
          echo "Waiting for Appium to be ready..."
          timeout 30 bash -c 'until curl -s http://127.0.0.1:4723/status > /dev/null; do sleep 2; done'
          echo "Appium is ready"

      - name: Run mobile tests with retries
        run: |
          MAX_RETRIES=3
          COUNT=0
          SUCCESS=0

          while [ $COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((COUNT+1)) of $MAX_RETRIES..."
            
            # Optional: restart Appium between retries
            pkill -f appium || true
            appium --log appium.log &
            sleep 5

            mvn test -pl mobile-tests \
              -Dplatform=android \
              -Dappium.server=http://127.0.0.1:4723 \
              -Dapp.path="${GITHUB_WORKSPACE}/mobile-tests/src/test/resources/apps/SauceLabs.apk" \
              -Ddevice.name="Pixel_6_API_35" \
              -Dplatform.version="15" \
              -Dcucumber.filter.tags="@mobile" \
              --no-transfer-progress
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              SUCCESS=1
              break
            else
              echo "Tests failed. Retrying after 10s..."
              sleep 10
              COUNT=$((COUNT+1))
            fi
          done

          if [ $SUCCESS -ne 1 ]; then
            echo "❌ All $MAX_RETRIES attempts failed."
            exit 1
          fi

      - name: Upload Appium logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: appium-logs
          path: appium.log
          if-no-files-found: warn

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-mobile
          path: mobile-tests/target/allure-results/
          if-no-files-found: warn

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-surefire-reports
          path: mobile-tests/target/surefire-reports/
          if-no-files-found: warn