name: 📱 Mobile Tests — Android Emulator (Optimized)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1-5'

jobs:
  mobile-android:
    name: 📱 Android Mobile Tests (Pixel 6 API 35)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17 (for Android SDK)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2
          appium --version

      - name: Pre-build mobile-tests module only
        run: |
          mvn install -pl mobile-tests -am -DskipTests --no-transfer-progress

      - name: Pre-launch Android Emulator with snapshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_API_35
          emulator-options: -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          snapshot: true
          script: echo "Emulator ready"

      - name: Start Appium server in background
        run: |
          appium --log appium.log &
          timeout 30 bash -c 'until curl -s http://127.0.0.1:4723/status > /dev/null; do sleep 2; done'
          echo "Appium is ready"

      - name: Run mobile tests with automatic Appium restart on failure
        run: |
          MAX_RETRIES=2
          COUNT=0
          SUCCESS=0

          while [ $COUNT -le $MAX_RETRIES ]; do
            echo "Running mobile tests (Attempt $((COUNT+1)))..."
            mvn test -pl mobile-tests \
              -Dplatform=android \
              -Dappium.server=http://127.0.0.1:4723 \
              -Dapp.path="${GITHUB_WORKSPACE}/mobile-tests/src/test/resources/apps/SauceLabs.apk" \
              -Ddevice.name="Pixel_6_API_35" \
              -Dplatform.version="15" \
              -Dcucumber.filter.tags="@mobile" \
              -Dsurefire.reportsDirectory=mobile-tests/target/surefire-reports \
              --fail-at-end \
              --no-transfer-progress
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              SUCCESS=1
              break
            else
              echo "⚠️ Tests failed. Restarting Appium and retrying..."
              pkill -f appium || true
              appium --log appium.log &
              sleep 5
              COUNT=$((COUNT+1))
            fi
          done

          if [ $SUCCESS -ne 1 ]; then
            echo "❌ All attempts failed."
            exit 1
          fi

      - name: Upload Appium logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: appium-logs
          path: appium.log
          if-no-files-found: warn

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-mobile
          path: mobile-tests/target/allure-results/
          if-no-files-found: warn

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-surefire-reports
          path: mobile-tests/target/surefire-reports/
          if-no-files-found: warn