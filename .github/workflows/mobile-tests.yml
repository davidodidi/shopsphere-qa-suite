name: 📱 Mobile Tests — Android Emulator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1-5'

jobs:
  mobile-android:
    name: 📱 Android Mobile Tests (Pixel 6 API 35)
    runs-on: macos-latest
    timeout-minutes: 40

    env:
      ANDROID_SDK_ROOT: /Users/runner/Library/Android/sdk
      PATH: /Users/runner/Library/Android/sdk/platform-tools:$PATH:$PATH

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium 3.x and UIAutomator2 driver
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2
          appium --version

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Create Pixel 6 Emulator
        run: |
          echo "no" | avdmanager create avd -n Pixel_6_API_35 -k "system-images;android-35;google_apis;x86_64" -d pixel
          echo "AVD created"

      - name: Start Emulator in background
        run: |
          nohup emulator -avd Pixel_6_API_35 -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim &
          echo "Waiting for emulator to boot..."
          timeout 300 bash -c 'until adb shell getprop sys.boot_completed | grep -m 1 1; do sleep 5; done'
          adb devices

      - name: Run mobile tests
        run: |
          mvn test -pl mobile-tests \
            -Dplatform=android \
            -Dappium.server=http://127.0.0.1:4723 \
            -Dapp.path="${GITHUB_WORKSPACE}/mobile-tests/src/test/resources/apps/SauceLabs.apk" \
            -Ddevice.name="Pixel_6_API_35" \
            -Dplatform.version="15" \
            -Dcucumber.filter.tags="@mobile" \
            --no-transfer-progress

      - name: Upload Appium logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: appium-logs
          path: appium.log
          if-no-files-found: warn

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-mobile
          path: mobile-tests/target/allure-results/
          if-no-files-found: warn

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-surefire-reports
          path: mobile-tests/target/surefire-reports/
          if-no-files-found: warn