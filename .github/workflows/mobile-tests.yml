name: 📱 Mobile Tests — Android Emulator

on:
  schedule:
    - cron: '0 3 * * 1-5'   # 3 AM UTC Mon–Fri
  workflow_dispatch:

jobs:
  mobile-android:
    name: 📱 Android Mobile Tests (Pixel 6 API 35)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium & UIAutomator2
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2
          appium --version

      - name: Enable KVM (required for Android emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
          sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build Maven modules
        run: mvn install -DskipTests --no-transfer-progress

      - name: Start Appium
        run: |
          appium --log appium.log &
          echo "Waiting for Appium server..."
          timeout 40 bash -c 'until curl -s http://127.0.0.1:4723/status > /dev/null; do sleep 2; done'
          echo "Appium server ready"

      - name: Run Android Emulator + Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_API_35
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # android-emulator-runner passes script: to /usr/bin/sh line-by-line,
          # which breaks multi-line constructs like until...do...done.
          # The fix is a standalone bash script invoked as a single command.
          script: bash mobile-tests/scripts/run-mobile-tests.sh

      - name: Upload Appium logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: appium.log

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile
          path: mobile-tests/target/allure-results/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-surefire-reports
          path: mobile-tests/target/surefire-reports/
