name: 📱 Mobile Tests — Android Emulator (Windows)

on:
  workflow_dispatch:

jobs:
  mobile-android-windows:
    name: 📱 Android Mobile Tests (Pixel 6 API 35)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17 (required for Android SDK / Appium)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js (required for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2 driver
        shell: pwsh
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2
          appium --version

      - name: Accept Android SDK licenses
        shell: pwsh
        run: |
          $sdkmanager = "${env:ANDROID_HOME}\cmdline-tools\latest\bin\sdkmanager.bat"
          & $sdkmanager --licenses | ForEach-Object { $_; }

      - name: Install required Android SDK packages
        shell: pwsh
        run: |
          $sdkmanager = "${env:ANDROID_HOME}\cmdline-tools\latest\bin\sdkmanager.bat"
          & $sdkmanager "platform-tools" "platforms;android-35" "system-images;android-35;google_apis;x86_64" "cmdline-tools;latest"

      - name: Create Android Emulator
        shell: pwsh
        run: |
          $avdmanager = "${env:ANDROID_HOME}\cmdline-tools\latest\bin\avdmanager.bat"
          & $avdmanager create avd -n Pixel_6_API_35 -k "system-images;android-35;google_apis;x86_64" -d pixel_6 --force

      - name: Start Emulator (blocking)
        shell: pwsh
        run: |
          Write-Host "Starting emulator..."
          Start-Process -NoNewWindow -FilePath "${env:ANDROID_HOME}\emulator\emulator.exe" -ArgumentList "-avd Pixel_6_API_35 -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim"

          # Wait until emulator fully boots
          $maxWait = 600  # 10 minutes max
          $waited = 0
          while ($true) {
              $booted = & "${env:ANDROID_HOME}\platform-tools\adb.exe" -s emulator-5554 shell getprop sys.boot_completed 2>$null
              if ($booted -eq "1") { break }
              Start-Sleep -Seconds 5
              $waited += 5
              if ($waited -ge $maxWait) {
                  Write-Error "Emulator did not boot in $maxWait seconds"
                  exit 1
              }
          }

          Write-Host "Emulator fully booted!"
          & "${env:ANDROID_HOME}\platform-tools\adb.exe" shell settings put global window_animation_scale 0
          & "${env:ANDROID_HOME}\platform-tools\adb.exe" shell settings put global transition_animation_scale 0
          & "${env:ANDROID_HOME}\platform-tools\adb.exe" shell settings put global animator_duration_scale 0

      - name: Start Appium server in background
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "appium.cmd" -ArgumentList "--log appium.log"
          Start-Sleep -Seconds 10
          Write-Host "Appium is ready"

      - name: Run mobile tests
        shell: pwsh
        run: |
          mvn test -pl mobile-tests `
            -Dplatform=android `
            -Dappium.server=http://127.0.0.1:4723 `
            -Dapp.path="${{ github.workspace }}\mobile-tests\src\test\resources\apps\SauceLabs.apk" `
            -Ddevice.name="Pixel_6_API_35" `
            -Dplatform.version="15" `
            -Dcucumber.filter.tags="@mobile" `
            --no-transfer-progress

      - name: Upload Appium logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: appium.log
          if-no-files-found: warn

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile
          path: mobile-tests/target/allure-results/
          if-no-files-found: warn

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        with:
          name: mobile-surefire-reports
          path: mobile-tests/target/surefire-reports/
          if-no-files-found: warn