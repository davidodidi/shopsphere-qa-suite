name: 📱 Mobile Tests — Android Emulator

on:
  workflow_dispatch:  # Manual trigger only — emulator jobs are slow and resource-heavy
  schedule:
    - cron: '0 3 * * 1-5'  # 3 AM UTC Mon-Fri (runs after regression suite)

jobs:
  mobile-android:
    name: 📱 Android Mobile Tests (Pixel 6 API 35)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js (required for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium 3.x and UIAutomator2 driver
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2
          appium --version

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get install -y cpu-checker
          kvm-ok

      - name: Build and install parent + core modules
        run: |
          mvn install -N -DskipTests --no-transfer-progress
          mvn install -pl core -DskipTests --no-transfer-progress

      - name: Start Appium server in background
        run: |
          appium --log appium.log &
          echo "Waiting for Appium to be ready..."
          timeout 30 bash -c 'until curl -s http://127.0.0.1:4723/status > /dev/null; do sleep 2; done'
          echo "Appium is ready"

      - name: Run mobile tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_API_35
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "Emulator is ready — running mobile tests"
            mvn test -pl mobile-tests \
              -Dplatform=android \
              -Dappium.server=http://127.0.0.1:4723 \
              -Dapp.path="${GITHUB_WORKSPACE}/mobile-tests/src/test/resources/apps/SauceLabs.apk" \
              -Ddevice.name="Pixel_6_API_35" \
              -Dplatform.version="16" \
              -Dcucumber.filter.tags="@mobile" \
              --no-transfer-progress

      - name: Upload Appium logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: appium-logs
          path: appium.log
          if-no-files-found: warn

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-mobile
          path: mobile-tests/target/allure-results/
          if-no-files-found: warn

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-surefire-reports
          path: mobile-tests/target/surefire-reports/
          if-no-files-found: warn
