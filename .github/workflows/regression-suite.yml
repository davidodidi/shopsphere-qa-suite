name: 🧪 Full Regression Suite — Nightly

on:
  schedule:
    - cron: '0 2 * * 1-5'   # 2 AM UTC Mon-Fri
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tags to run'
        required: false
        default: '@regression'
      environment:
        description: 'Target environment'
        required: false
        default: 'staging'
        type: choice
        options: [staging, dev, prod]

jobs:
  unit-tests:
    name: 🔬 Unit Tests (TDD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: Run JUnit unit tests
        run: mvn test -pl core --no-transfer-progress
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: core/target/surefire-reports/
          if-no-files-found: warn

  web-regression:
    name: 🌐 Web Regression
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 45
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build and install core module
        run: mvn clean install -DskipTests --no-transfer-progress

      - name: Start Selenium Grid
        run: |
          docker compose -f docker/docker-compose.yml up -d selenium-hub chrome-node-1 chrome-node-2 firefox-node
          timeout 90 bash -c 'until curl -s http://localhost:4444/wd/hub/status | grep "\"ready\": true" > /dev/null; do sleep 3; done'

      - name: Run Web Regression - ${{ matrix.browser }}
        run: |
          mvn clean test -pl web-tests \
            -Dcucumber.filter.tags="${{ github.event.inputs.tags || '@regression' }}" \
            -Dbrowser=${{ matrix.browser }} \
            -Dgrid.url=http://localhost:4444/wd/hub \
            -Denv=${{ github.event.inputs.environment || 'staging' }} \
            --no-transfer-progress
        env:
          ADMIN_USERNAME: ${{ secrets.STAGING_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.STAGING_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-web-${{ matrix.browser }}
          path: web-tests/target/allure-results/
          if-no-files-found: warn

  api-regression:
    name: 🔌 API Regression + Contract Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build and install core module
        run: mvn install -DskipTests --no-transfer-progress

      - name: Run API Regression Tests
        run: |
          mvn test -pl api-tests \
            -Denv=${{ github.event.inputs.environment || 'staging' }} \
            -Dapi.response.time.threshold=5000 \
            --no-transfer-progress

      - name: Run Consumer Contract Test (generates pact file)
        run: |
          mvn verify -pl api-tests \
            --no-transfer-progress

      - name: Run Provider Contract Verification (verifies against mock server)
        run: |
          mvn test -pl api-tests \
            -Dtest="ProductProviderContractTest" \
            --no-transfer-progress
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: api-tests/target/allure-results/
          if-no-files-found: warn

      - name: Upload Pact Files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pact-contracts
          path: api-tests/target/pacts/
          if-no-files-found: warn

  e2e-tests:
    name: 🔄 E2E System Tests
    runs-on: ubuntu-latest
    needs: [web-regression, api-regression]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build and install core module
        run: mvn clean install -DskipTests --no-transfer-progress

      - name: Start Selenium Grid
        run: |
          docker compose -f docker/docker-compose.yml up -d selenium-hub chrome-node-1
          timeout 90 bash -c 'until curl -s http://localhost:4444/wd/hub/status | grep "\"ready\": true" > /dev/null; do sleep 3; done'

      - name: Run E2E Tests
        run: |
          mvn clean test -pl web-tests \
            -Dcucumber.filter.tags="@e2e" \
            -Dgrid.url=http://localhost:4444/wd/hub \
            -Denv=${{ github.event.inputs.environment || 'staging' }} \
            --no-transfer-progress

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-e2e
          path: web-tests/target/allure-results/
          if-no-files-found: warn

  publish-allure-report:
    name: 📈 Publish Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: [web-regression, api-regression, e2e-tests]
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Post Report Link to Summary
        run: |
          echo "## 📊 Allure Report Published" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Full Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY
